<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Math Game</title>
    <link rel="stylesheet" href="styles.css">
</head>
<body>
    <div class="container">
        <div class="game-header">
            <h1>🧮 Math Challenge</h1>
            <div class="game-info">
                <div class="score-box">
                    <span class="label">Correct Answers:</span>
                    <span class="score" id="score">0</span>/10
                </div>
                <div class="question-counter" id="questionCounter">Question 1</div>
            </div>
        </div>

        <div class="game-content" id="gameContent">
            <div class="question-type" id="questionType"></div>
            <div class="question" id="question"></div>
            <div class="hint" id="hint">Enter your answer, then press Submit or Enter.</div>
            <div class="input-section">
                <input 
                    type="text" 
                    id="answerInput" 
                    placeholder="Enter your answer" 
                    autocomplete="off"
                >
                <button id="submitBtn" class="btn btn-primary">Submit Answer</button>
            </div>

            <div class="feedback" id="feedback"></div>
        </div>

        <div class="win-screen" id="winScreen" style="display: none;">
            <div class="win-content">
                <h2>🎉 You Win! 🎉</h2>
                <p>Congratulations! You answered 10 questions correctly!</p>
                <button id="restartBtn" class="btn btn-primary">Play Again</button>
            </div>
        </div>
    </div>

    <script src="game.ja"></script>
</body>
</html>
